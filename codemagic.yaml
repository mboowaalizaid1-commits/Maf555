workflows:
  android-apk:
    name: Android APK
    max_build_duration: 60
    environment:
      node: 18.20.0
      java: 17
    scripts:
      - name: Install deps
        script: npm install --ignore-scripts
      - name: Prebuild
        script: npx expo prebuild --platform android --clean
      - name: Fix kotlinVersion
        script: |
          if grep -q "ext {" android/build.gradle; then
            sed -i '' 's/ext {/ext {\n            kotlinVersion = "2.1.20"/' android/build.gradle
          else
            sed -i '' 's/buildscript {/buildscript {\n    ext {\n        kotlinVersion = "2.1.20"\n    }/' android/build.gradle
          fi
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease
          echo "*** Finding APK ***"
          find . -name "*.apk" 2>/dev/null
    artifacts:
      - android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - mboowaalizaid1@gmail.com
        groups:
          - maf5
        notify:
          success: true
